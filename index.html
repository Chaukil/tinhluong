<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Tính Lương</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header text-center">
                        <h4><i class="fas fa-calculator me-2"></i>Bảng Tính Lương</h4>
                        <p class="mb-0 small">Hệ thống tính lương tự động</p>
                    </div>
                    <div class="card-body p-3">
                        <form id="salaryForm">
                            <div class="row g-2">
                                <!-- Lương cơ bản -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-money-bill-wave me-1"></i>Lương Cơ Bản</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">₫</span>
                                        <input type="text" class="form-control currency-input" id="basicSalary" placeholder="0" required>
                                    </div>
                                </div>

                                <!-- Ngày làm việc -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-calendar-day me-1"></i>Ngày Làm Việc</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="workingDays" placeholder="0" required>
                                </div>

                                <!-- Ngày lễ -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-glass-cheers me-1"></i>Ngày Lễ</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="holidayDays" placeholder="0">
                                </div>

                                <!-- Phép năm -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-umbrella-beach me-1"></i>Phép Năm</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="annualLeave" placeholder="0">
                                </div>

                                <!-- Nghỉ hưởng lương -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-bed me-1"></i>Nghỉ Hưởng Lương</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="paidLeave" placeholder="0">
                                </div>

                                <!-- Tăng ca thường -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-clock me-1"></i>Tăng Ca Thường (giờ)</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="regularOvertime" placeholder="0">
                                </div>

                                <!-- Tăng ca chủ nhật -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-sun me-1"></i>Tăng Ca CN (giờ)</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="sundayOvertime" placeholder="0">
                                </div>

                                <!-- Ca đêm -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-moon me-1"></i>Ca Đêm (giờ)</label>
                                    <input type="text" class="form-control form-control-sm number-input" id="nightShift" placeholder="0">
                                </div>

                                <!-- Trợ cấp nhà trọ -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-home me-1"></i>TC Nhà Trọ</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">₫</span>
                                        <input type="text" class="form-control currency-input" id="housingAllowance" value="200,000" readonly>
                                    </div>
                                </div>

                                <!-- Trợ cấp đi lại -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-bus me-1"></i>TC Đi Lại</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">₫</span>
                                        <input type="text" class="form-control currency-input" id="transportAllowance" value="200,000" readonly>
                                    </div>
                                </div>

                                <!-- Loại thưởng -->
                                <div class="col-md-6 mb-2">
                                    <label class="form-label small"><i class="fas fa-award me-1"></i>Loại Thưởng</label>
                                    <select class="form-control form-control-sm" id="bonusType">
                                        <option value="efficiency">Hiệu Suất (900k)</option>
                                        <option value="productivity">Năng Suất</option>
                                    </select>
                                </div>

                                <!-- Thưởng năng suất -->
                                <div class="col-md-6 mb-2" id="productivityBonusDiv" style="display: none;">
                                    <label class="form-label small"><i class="fas fa-trophy me-1"></i>Thưởng Năng Suất</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text">₫</span>
                                        <input type="text" class="form-control currency-input" id="productivityBonus" placeholder="0">
                                    </div>
                                </div>
                            </div>

                            <div class="text-center mt-3">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fas fa-calculator me-1"></i>Tính Lương
                                </button>
                            </div>
                        </form>

                        <!-- Kết quả -->
                        <div id="results" class="mt-4" style="display: none;">
                            <div class="row g-2">
                                <!-- Thu nhập -->
                                <div class="col-lg-6 mb-3">
                                    <div class="card income-section">
                                        <div class="card-header bg-success text-white py-2">
                                            <h6 class="mb-0"><i class="fas fa-plus-circle me-1"></i>Mục A: Thu Nhập</h6>
                                        </div>
                                        <div class="card-body p-2" id="incomeDetails"></div>
                                    </div>
                                </div>

                                <!-- Khấu trừ -->
                                <div class="col-lg-6 mb-3">
                                    <div class="card deduction-section">
                                        <div class="card-header bg-danger text-white py-2">
                                            <h6 class="mb-0"><i class="fas fa-minus-circle me-1"></i>Mục B: Khấu Trừ</h6>
                                        </div>
                                        <div class="card-body p-2" id="deductionDetails"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Thực lãnh -->
                            <div class="row">
                                <div class="col-12">
                                    <div class="result-card">
                                        <h5><i class="fas fa-wallet me-1"></i>Thực Lãnh</h5>
                                        <h3 id="netSalary" class="mt-2"></h3>
                                        <p class="mt-1 small">Lương thực tế sau khấu trừ</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
